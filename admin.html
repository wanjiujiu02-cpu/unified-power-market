<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>糖果游戏测试控制台</title><style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#7b2cbd,#21043f 65%);color:#fff;font-family:Arial,"Microsoft YaHei",sans-serif;min-height:100vh;padding:30px}.wrap{max-width:780px;margin:auto}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.head a{color:#fff36a}.notice{background:#ffcf3d;color:#471151;padding:14px;border-radius:14px;font-weight:800}.card{background:#39105fe8;border:1px solid #ffffff30;border-radius:20px;padding:22px;margin-top:18px;box-shadow:0 18px 40px #16002780}.row{display:grid;grid-template-columns:1fr 130px 60px;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid #ffffff1f}.row small{display:block;color:#cdb8dd;margin-top:5px}.row input[type=range]{width:100%}.value{font-weight:900;color:#fff36a;text-align:right}.credit{display:flex;gap:10px;flex-wrap:wrap}.credit input{flex:1;min-width:180px;padding:13px;border-radius:10px;border:0;font-size:17px}.btn{border:0;border-radius:12px;padding:13px 18px;background:linear-gradient(135deg,#ff5aa9,#b724e8);color:#fff;font-weight:900;cursor:pointer}.btn.green{background:linear-gradient(135deg,#16c8a1,#087e73)}.status{min-height:24px;color:#72ffe2;margin-top:14px}@media(max-width:600px){body{padding:14px}.row{grid-template-columns:1fr}.value{text-align:left}}
</style></head><body><div class="wrap"><div class="head"><div><small>LOCAL TEST PANEL</small><h1>糖果游戏测试控制台</h1></div><a href="index.html">返回游戏</a></div><div class="notice">仅用于虚拟积分测试。配置只保存在当前浏览器，不会远程控制其他用户。</div><section class="card"><h2>概率参数</h2><div class="row"><label>普通中奖率<small>每次普通旋转的基础中奖机会</small></label><input id="win" type="range" min="0" max="60" step="1"><b class="value" id="winV"></b></div><div class="row"><label>免费游戏触发率<small>建议保持在0.1%–1%之间</small></label><input id="free" type="range" min="0" max="3" step="0.05"><b class="value" id="freeV"></b></div><div class="row"><label>连续中奖惊喜率<small>上一局中奖后，下一局额外连胜机会</small></label><input id="streak" type="range" min="0" max="50" step="1"><b class="value" id="streakV"></b></div><button id="save" class="btn green">保存概率设置</button><button id="reset" class="btn">恢复推荐值</button><div class="status" id="status"></div></section><section class="card"><h2>虚拟积分工具</h2><div class="credit"><input id="credit" type="number" min="1" step="1000" placeholder="输入要增加的积分"><button id="add" class="btn">增加积分</button></div><p><small>返回游戏或下一次刷新数据时到账。本功能没有充值、提现或真实货币。</small></p></section></div><script>
const $=s=>document.querySelector(s),defaults={winRate:.18,freeRate:.0035,streakRate:.12};let cfg;try{cfg=Object.assign({},defaults,JSON.parse(localStorage.getItem('candy_settings')||'{}'))}catch(e){cfg={...defaults}}function show(){win.value=cfg.winRate*100;free.value=cfg.freeRate*100;streak.value=cfg.streakRate*100;sync()}function sync(){winV.textContent=(+win.value).toFixed(0)+'%';freeV.textContent=(+free.value).toFixed(2)+'%';streakV.textContent=(+streak.value).toFixed(0)+'%'}[win,free,streak].forEach(x=>x.oninput=sync);save.onclick=()=>{cfg={winRate:+win.value/100,freeRate:+free.value/100,streakRate:+streak.value/100};localStorage.setItem('candy_settings',JSON.stringify(cfg));status.textContent='设置已保存，下一次旋转生效'};reset.onclick=()=>{cfg={...defaults};localStorage.setItem('candy_settings',JSON.stringify(cfg));show();status.textContent='已恢复推荐值'};add.onclick=()=>{let n=Math.floor(+credit.value);if(n<=0)return status.textContent='请输入大于0的积分';localStorage.setItem('candy_credit',String(n));status.textContent='已准备增加 '+n+' 积分，请返回游戏';credit.value=''};show();
</script></body></html>
